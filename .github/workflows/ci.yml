name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scratch/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scratch/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate job: cheapest runner, fails fast ──────────────────────────
  test-linux:
    name: Linux x86_64 (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-17 llvm-17-dev

      - name: Build
        run: ./run-build.sh

      - name: Run all tests
        run: ./run-tests.sh

  # ── Fan-out: all expensive jobs run in parallel after gate passes ──

  test-unix:
    name: ${{ matrix.name }}
    needs: test-linux
    if: github.event.pull_request.draft != true
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (full suite)
            runner: macos-latest
            llvm_install: brew install llvm@17
          - name: Linux ARM64 (full suite)
            runner: ubuntu-24.04-arm
            llvm_install: sudo apt-get update && sudo apt-get install -y llvm-17 llvm-17-dev
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install LLVM
        run: ${{ matrix.llvm_install }}

      - name: Build
        run: ./run-build.sh

      - name: Run all tests
        run: ./run-tests.sh

  test-windows:
    name: Windows (full suite)
    needs: test-linux
    if: github.event.pull_request.draft != true
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up Python (for selfhost AST normalization)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:/llvm
          key: llvm-18.1.8-windows-amd64-msvc17

      - name: Install LLVM (vovkos pre-built with dev headers)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -L -o llvm.7z "https://github.com/vovkos/llvm-package-windows/releases/download/llvm-18.1.8/llvm-18.1.8-windows-amd64-msvc17-msvcrt.7z"
          7z x llvm.7z -oC:/llvm -y

      - name: Configure LLVM paths
        run: |
          echo "LLVM_PREFIX=C:/llvm/llvm-18.1.8-windows-amd64-msvc17-msvcrt" >> $GITHUB_ENV
          echo "C:/llvm/llvm-18.1.8-windows-amd64-msvc17-msvcrt/bin" >> $GITHUB_PATH

      - name: Build
        run: ./run-build.sh

      - name: Run all tests
        run: ./run-tests.sh

  cross-compile-windows-arm64:
    name: Windows ARM64 (cross-compile check)
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cross-compile for Windows ARM64 (no LLVM)
        run: zig build -Dtarget=aarch64-windows

      - name: Verify binary was produced
        run: |
          test -f zig-out/bin/klar.exe
          file zig-out/bin/klar.exe
