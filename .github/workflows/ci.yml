name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: macOS (full suite)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install LLVM
        run: brew install llvm@17

      - name: Build
        run: ./run-build.sh

      - name: Run all tests
        run: ./run-tests.sh

  test-windows:
    name: Windows (VM-only)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (VM-only mode)
        run: ./run-build.sh

      - name: Run Windows tests
        run: ./scripts/run-windows-tests.sh

  test-linux:
    name: Linux (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-17 llvm-17-dev

      - name: Build
        run: ./run-build.sh

      - name: Run all tests
        run: ./run-tests.sh
